<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>خیام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <header>
    <div class="header-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="تاریخچه">☰</button>
      <a href="/" class="logo">
        <div class="logo-mark">د</div>
        <span class="logo-text">خیام</span>
      </a>
    </div>
    <nav class="nav-links">
  <a href="/chat" class="nav-btn active">چت</a>
  <a href="/tutor" class="nav-btn">بیاموز</a>
</nav>
<div id="auth-buttons" style="display:flex; gap:6px;">
  <a href="/login" class="nav-btn">ورود</a>
  <a href="/register" class="nav-btn" style="border-color:var(--gold-dim);color:var(--gold);">ثبت‌نام</a>
</div>
<div id="user-menu" style="display:none; align-items:center; gap:6px;">
  <a href="/profile" class="nav-btn" id="nav-username">پروفایل</a>
  <a href="/logout" class="nav-btn">خروج</a>
</div>
    <button class="new-chat-btn" onclick="newChat()">+ چت جدید</button>
  </header>

  <div class="app-body">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">تاریخچه گفتگوها</div>
      <div class="sidebar-list" id="sidebar-list">
        <div class="sidebar-empty" id="sidebar-empty">
          هنوز گفتگویی ندارید.<br/>یک چت جدید شروع کنید.
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="chat-main">
      <div class="chat-wrapper" id="chat-wrapper">
        <div class="messages" id="messages">
          <div class="welcome" id="welcome">
            <span class="welcome-symbol">🕌</span>
            <h1>سلام! خوش آمدید</h1>
            <p>من خیام هستم — دستیار هوشمند افغانی شما.</p>
            <div class="suggestion-grid">
              <button class="suggestion" onclick="useSuggestion(this)">تاریخچه کابل را برایم بگو</button>
              <button class="suggestion" onclick="useSuggestion(this)">یک شعر دری برایم بنویس</button>
              <button class="suggestion" onclick="useSuggestion(this)">غذاهای مشهور افغانستان کدام‌اند؟</button>
              <button class="suggestion" onclick="useSuggestion(this)">ولایات افغانستان را نام ببر</button>
            </div>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-box">
          <textarea id="user-input" rows="1" placeholder="پیام خود را بنویسید..."></textarea>
          <button id="send-btn" onclick="sendMessage()">↑</button>
        </div>
        <p class="input-hint">Enter برای ارسال · Shift+Enter برای سطر جدید</p>
      </div>
    </div>

  </div>
<!-- BOTTOM NAV — mobile only -->
<nav class="kh-bottom-nav">
  <div class="kh-bottom-nav-inner">
    <a href="/" class="kh-bottom-tab">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">خانه</span>
    </a>
    <a href="/chat" class="kh-bottom-tab">
      <span class="tab-icon">💬</span>
      <span class="tab-label">چت</span>
    </a>
    <a href="/tutor" class="kh-bottom-tab">
      <span class="tab-icon">📚</span>
      <span class="tab-label">بیاموز</span>
    </a>
    <a href="/profile" class="kh-bottom-tab">
      <span class="tab-icon">👤</span>
      <span class="tab-label">پروفایل</span>
    </a>
  </div>
</nav>
  <script>
    // ── STATE ──
    const STORAGE_KEY = 'darigpt_conversations';
    let conversations = loadAllConversations();
    let currentId     = null;
    let history       = [];
    let isLoading     = false;
    let sidebarOpen   = true;

    // ── STORAGE ──
    function loadAllConversations() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
      catch { return {}; }
    }

    function saveAllConversations() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
    }

    function generateId() {
      return 'conv_' + Date.now();
    }

    // take first 40 chars of first user message as title
    function makeTitleFromMessage(msg) {
      const trimmed = msg.trim().replace(/\n/g, ' ');
      return trimmed.length > 40 ? trimmed.slice(0, 40) + '...' : trimmed;
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000)   return 'همین الان';
      if (diff < 3600000) return Math.floor(diff/60000) + ' دقیقه پیش';
      if (diff < 86400000)return Math.floor(diff/3600000) + ' ساعت پیش';
      return d.toLocaleDateString('fa-AF');
    }

    // ── SIDEBAR ──
    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
    }

    function renderSidebar() {
      const list  = document.getElementById('sidebar-list');
      const empty = document.getElementById('sidebar-empty');
      const ids   = Object.keys(conversations).sort((a,b) =>
        conversations[b].updatedAt - conversations[a].updatedAt
      );

      if (ids.length === 0) {
        if (!empty) list.innerHTML = '<div class="sidebar-empty" id="sidebar-empty">هنوز گفتگویی ندارید.<br/>یک چت جدید شروع کنید.</div>';
        return;
      }

      list.innerHTML = '';
      ids.forEach(id => {
        const conv = conversations[id];
        const item = document.createElement('div');
        item.className = 'conv-item' + (id === currentId ? ' active' : '');
        item.innerHTML = `
          <span class="conv-title">${conv.title}</span>
          <span class="conv-date">${formatDate(conv.updatedAt)}</span>
          <button class="conv-delete" onclick="deleteConv(event,'${id}')" title="حذف">✕</button>
        `;
        item.addEventListener('click', () => loadConversation(id));
        list.appendChild(item);
      });
    }

    // ── CONVERSATION ACTIONS ──
    function newChat() {
      currentId = null;
      history   = [];
      const messagesEl = document.getElementById('messages');
      messagesEl.innerHTML = `
        <div class="welcome" id="welcome">
          <span class="welcome-symbol">🕌</span>
          <h1>سلام! خوش آمدید</h1>
          <p>من خیام هستم — دستیار هوشمند افغانی شما.</p>
          <div class="suggestion-grid">
            <button class="suggestion" onclick="useSuggestion(this)">تاریخچه کابل را برایم بگو</button>
            <button class="suggestion" onclick="useSuggestion(this)">یک شعر دری برایم بنویس</button>
            <button class="suggestion" onclick="useSuggestion(this)">غذاهای مشهور افغانستان کدام‌اند؟</button>
            <button class="suggestion" onclick="useSuggestion(this)">ولایات افغانستان را نام ببر</button>
          </div>
        </div>`;
      renderSidebar();
      document.getElementById('user-input').focus();
    }

    function loadConversation(id) {
      const conv = conversations[id];
      if (!conv) return;

      currentId = id;
      history   = conv.messages.map(m => ({ role: m.role, content: m.content }));

      const messagesEl = document.getElementById('messages');
      messagesEl.innerHTML = '';

      conv.messages.forEach(m => {
        appendBubble(m.role === 'user' ? 'user' : 'ai', m.content);
      });

      renderSidebar();
      scrollToBottom();

      // on mobile close sidebar after selecting
      if (window.innerWidth <= 640) {
        sidebarOpen = false;
        document.getElementById('sidebar').classList.add('collapsed');
      }
    }

    function deleteConv(e, id) {
      e.stopPropagation();
      delete conversations[id];
      saveAllConversations();
      if (currentId === id) newChat();
      else renderSidebar();
    }

    // ── CHAT UI ──
    function scrollToBottom() {
      const w = document.getElementById('chat-wrapper');
      w.scrollTop = w.scrollHeight;
    }

    function appendBubble(role, text) {
      const messagesEl = document.getElementById('messages');
      const welcome    = document.getElementById('welcome');
      if (welcome) welcome.style.display = 'none';

      const div    = document.createElement('div');
      div.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = `avatar ${role}`;
      avatar.textContent = role === 'ai' ? 'د' : '👤';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      div.appendChild(avatar);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      scrollToBottom();
      return bubble;
    }

    function showTyping() {
      const messagesEl = document.getElementById('messages');
      const welcome    = document.getElementById('welcome');
      if (welcome) welcome.style.display = 'none';

      const div = document.createElement('div');
      div.className = 'message ai';
      div.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'avatar ai';
      avatar.textContent = 'د';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

      div.appendChild(avatar);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    function useSuggestion(btn) {
      document.getElementById('user-input').value = btn.textContent.trim();
      sendMessage();
    }

    // ── SEND MESSAGE ──
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text  = input.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      document.getElementById('send-btn').disabled = true;
      input.value = '';
      input.style.height = 'auto';

      // if brand new conversation, create it now
      if (!currentId) {
        currentId = generateId();
        conversations[currentId] = {
          id:        currentId,
          title:     makeTitleFromMessage(text),
          messages:  [],
          createdAt: Date.now(),
          updatedAt: Date.now()
        };
      }

      appendBubble('user', text);
      showTyping();

      history.push({ role: 'user', content: text });

      try {
        const res  = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history.slice(-10) })
        });
        const data = await res.json();
        removeTyping();

        appendBubble('ai', data.reply);
        history.push({ role: 'assistant', content: data.reply });

        // save both messages to conversation
        conversations[currentId].messages.push(
          { role: 'user',      content: text       },
          { role: 'assistant', content: data.reply }
        );
        conversations[currentId].updatedAt = Date.now();
        saveAllConversations();
        renderSidebar();

      } catch (err) {
        removeTyping();
        appendBubble('ai', 'خطایی رخ داد. لطفاً دوباره امتحان کنید.');
      }

      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }

    // ── INPUT BEHAVIOR ──
    const inputEl = document.getElementById('user-input');
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    });
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
      async function checkAuth() {
    const res  = await fetch('/api/me');
    const data = await res.json();
    if (data.logged_in) {
      document.getElementById('auth-buttons').style.display = 'none';
      const menu = document.getElementById('user-menu');
      menu.style.display = 'flex';
      document.getElementById('nav-username').textContent = data.username;
    }
  }
  checkAuth();

    // ── INIT ──
    renderSidebar();
  </script>
</body>
</html>
