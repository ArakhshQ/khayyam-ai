<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ورود — خیام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
   
    
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Vazirmatn', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
    }
   
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-mark {
      width: 30px; height: 30px; border: 1.5px solid var(--gold);
      border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 14px; font-weight: 700; color: var(--gold);
    }
    .logo-text { font-size: 16px; font-weight: 700; color: var(--gold); }
    .nav-link {
      color: var(--text-dim); text-decoration: none; font-size: 13px;
      padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .page {
      position: relative; z-index: 1; flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 16px;
    }
    .card {
      width: 100%; max-width: 400px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 36px 32px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-top { text-align: center; margin-bottom: 28px; }
    .card-icon { font-size: 36px; display: block; margin-bottom: 12px; }
    .card-top h1 { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
    .card-top p  { font-size: 13px; color: var(--text-dim); line-height: 1.7; }
    .form-group  { margin-bottom: 16px; }
    .form-label  {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--text-dim); margin-bottom: 7px; letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%; padding: 11px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 14px; outline: none; transition: border-color 0.2s; direction: rtl;
    }
    .form-input:focus { border-color: var(--gold-dim); }
    .form-input::placeholder { color: var(--text-dim); }
    .submit-btn {
      width: 100%; padding: 13px;
      background: var(--gold); color: #0f0e0c;
      border: none; border-radius: 9px;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .submit-btn:hover { background: #e0bb60; transform: translateY(-1px); }
    .submit-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; transform: none; }
    .error-box {
      background: var(--red); border: 1px solid #6a2a2a;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: var(--red-lt);
      margin-bottom: 16px; display: none;
    }
    .hint {
      font-size: 12px; color: var(--text-dim);
      margin-top: 5px; padding-right: 4px;
    }
    .footer-link {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--text-dim);
    }
    .footer-link a { color: var(--gold); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">
      <div class="logo-mark">خ</div>
      <span class="logo-text">خیام</span>
    </a>
    <a href="/register" class="nav-link">ثبت‌نام</a>
  </nav>

  <div class="page">
    <div class="card">
      <div class="card-top">
        <span class="card-icon">🔑</span>
        <h1>خوش آمدید</h1>
        <p>با ایمیل، شماره تلفن، یا نام کاربری وارد شوید</p>
      </div>

      <div id="error-box" class="error-box"></div>

      <div class="form-group">
        <label class="form-label">ایمیل / شماره تلفن / نام کاربری</label>
        <input class="form-input" type="text" id="identifier" placeholder="هر کدام را وارد کنید" style="direction:ltr"/>
        <div class="hint">می‌توانید با ایمیل، شماره تلفن، یا نام کاربری وارد شوید</div>
      </div>

      <div class="form-group">
        <label class="form-label">رمز عبور</label>
        <input class="form-input" type="password" id="password" placeholder="رمز عبور خود را وارد کنید"/>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="login()">
        ورود ←
      </button>

      <div class="footer-link">
        حساب ندارید؟ <a href="/register">ثبت‌نام کنید</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
    }

    async function login() {
      const identifier = document.getElementById('identifier').value.trim();
      const password   = document.getElementById('password').value;

      if (!identifier) return showError('لطفاً ایمیل یا شماره تلفن یا نام کاربری را وارد کنید');
      if (!password)   return showError('رمز عبور الزامی است');

      const btn = document.getElementById('submit-btn');
      btn.disabled    = true;
      btn.textContent = 'در حال ورود...';

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/chat';
        } else {
          showError(data.error);
          btn.disabled    = false;
          btn.textContent = 'ورود ←';
        }
      } catch (err) {
        showError('خطای اتصال. دوباره امتحان کنید.');
        btn.disabled    = false;
        btn.textContent = 'ورود ←';
      }
    }
  </script>
</body>
</html>
