<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ورود — خیام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a href="/" class="logo">
      <div class="logo-mark">خ</div>
      <span class="logo-text">خیام</span>
    </a>
    <a href="/register" class="nav-link">ثبت‌نام</a>
  </nav>

  <div class="page">
    <div class="card">
      <div class="card-top">
        <span class="card-icon">🔑</span>
        <h1>خوش آمدید</h1>
        <p>با ایمیل، شماره تلفن، یا نام کاربری وارد شوید</p>
      </div>

      <div id="error-box" class="error-box"></div>

      <div class="form-group">
        <label class="form-label">ایمیل / شماره تلفن / نام کاربری</label>
        <input class="form-input" type="text" id="identifier" placeholder="هر کدام را وارد کنید" style="direction:ltr"/>
        <div class="hint">می‌توانید با ایمیل، شماره تلفن، یا نام کاربری وارد شوید</div>
      </div>

      <div class="form-group">
        <label class="form-label">رمز عبور</label>
        <input class="form-input" type="password" id="password" placeholder="رمز عبور خود را وارد کنید"/>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="login()">
        ورود ←
      </button>

      <div class="footer-link">
        حساب ندارید؟ <a href="/register">ثبت‌نام کنید</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
    }

    async function login() {
      const identifier = document.getElementById('identifier').value.trim();
      const password   = document.getElementById('password').value;

      if (!identifier) return showError('لطفاً ایمیل یا شماره تلفن یا نام کاربری را وارد کنید');
      if (!password)   return showError('رمز عبور الزامی است');

      const btn = document.getElementById('submit-btn');
      btn.disabled    = true;
      btn.textContent = 'در حال ورود...';

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/chat';
        } else {
          showError(data.error);
          btn.disabled    = false;
          btn.textContent = 'ورود ←';
        }
      } catch (err) {
        showError('خطای اتصال. دوباره امتحان کنید.');
        btn.disabled    = false;
        btn.textContent = 'ورود ←';
      }
    }
  </script>
</body>
</html>
