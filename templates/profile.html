<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>پروفایل — خیام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
  body {
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .nav-links { display: flex; gap: 6px; }

  .nav-btn {
    padding: 5px 12px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Vazirmatn', sans-serif;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.danger:hover { border-color: var(--red); color: var(--red-lt); }

  /* ── PAGE ── */
  .page {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 20px 100px;
  }

  /* ── USER CARD ── */
  .user-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
    animation: fadeUp 0.4s ease both;
  }

  .user-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: rgba(201,168,76,0.15);
    border: 2px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
  }

  .user-info { flex: 1; }
  .user-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .user-detail { font-size: 13px; color: var(--text-dim); line-height: 1.8; }

  .user-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    border: 1px solid var(--gold-dim);
    font-weight: 500;
    white-space: nowrap;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* ── CONVERSATION LIST ── */
  .conv-list { display: flex; flex-direction: column; gap: 8px; }

  .conv-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .conv-card:hover { border-color: var(--gold-dim); background: var(--surface2); }

  .conv-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  .conv-body { flex: 1; min-width: 0; }

  .conv-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .conv-date { font-size: 12px; color: var(--text-dim); }

  .conv-del {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .conv-del:hover { background: var(--red); color: var(--red-lt); border-color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.8;
  }
  .empty-state a { color: var(--gold); text-decoration: none; }

  .loading {
    text-align: center;
    padding: 32px;
    color: var(--text-dim);
    font-size: 14px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    header { padding: 0 14px; }
    .page { padding: 24px 14px 100px; }
    .user-card { padding: 20px 16px; gap: 14px; }
    .user-name { font-size: 17px; }
    .user-avatar { width: 48px; height: 48px; font-size: 20px; }
  }
</style>
</head>
<body>
  <header>
    <a href="/" class="logo">
      <div class="logo-mark">خ</div>
      <span class="logo-text">خیام</span>
    </a>
    <div class="nav-links">
      <a href="/chat" class="nav-btn">چت جدید</a>
      <a href="/logout" class="nav-btn danger">خروج</a>
    </div>
  </header>

  <div class="page">

    <!-- user info -->
    <div class="user-card" id="user-card">
      <div class="user-avatar" id="user-avatar">؟</div>
      <div class="user-info">
        <div class="user-name" id="user-name">در حال بارگذاری...</div>
        <div class="user-detail" id="user-detail"></div>
      </div>
      <span class="user-badge">رایگان</span>
    </div>

    <!-- conversations -->
    <div class="section-title">گفتگوهای ذخیره شده</div>
    <div class="conv-list" id="conv-list">
      <div class="loading">در حال بارگذاری...</div>
    </div>

  </div>
<!-- BOTTOM NAV — mobile only -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="/" class="bottom-tab">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">خانه</span>
    </a>
    <a href="/chat" class="bottom-tab">
      <span class="tab-icon">💬</span>
      <span class="tab-label">چت</span>
    </a>
    <a href="/tutor" class="bottom-tab">
      <span class="tab-icon">📚</span>
      <span class="tab-label">بیاموز</span>
    </a>
    <a href="/profile" class="bottom-tab">
      <span class="tab-icon">👤</span>
      <span class="tab-label">پروفایل</span>
    </a>
  </div>
</nav>
  <script>
    async function checkAdminLink() {
    const res  = await fetch('/api/me');
    const data = await res.json();
    if (data.is_admin) {
      const links = document.querySelector('.nav-links');
      const adminLink = document.createElement('a');
      adminLink.href      = '/admin';
      adminLink.className = 'nav-btn';
      adminLink.textContent = '⚙️ ادمین';
      adminLink.style.borderColor = 'var(--gold-dim)';
      adminLink.style.color = 'var(--gold)';
      links.prepend(adminLink);
    }
  }
  checkAdminLink();
   function formatDate(iso) {
  // server sends UTC time without timezone info — add Z to tell
  // JavaScript it is UTC so it converts to local time correctly
  const utcString = iso.endsWith('Z') ? iso : iso + 'Z';
  const d    = new Date(utcString);
  const now  = new Date();
  const diff = now - d;
  if (diff < 60000)    return 'همین الان';
  if (diff < 3600000)  return Math.floor(diff / 60000) + ' دقیقه پیش';
  if (diff < 86400000) return Math.floor(diff / 3600000) + ' ساعت پیش';
  return d.toLocaleDateString('fa-AF');
}

    async function loadUser() {
      const res  = await fetch('/api/me');
      const data = await res.json();
      if (!data.logged_in) {
        window.location.href = '/login';
        return;
      }
      const initial = data.username.charAt(0).toUpperCase();
      document.getElementById('user-avatar').textContent = initial;
      document.getElementById('user-name').textContent   = data.username;
      const detail = [];
      if (data.email) detail.push('📧 ' + data.email);
      if (data.phone) detail.push('📱 ' + data.phone);
      document.getElementById('user-detail').textContent = detail.join(' · ');
    }

    async function loadConversations() {
      const list = document.getElementById('conv-list');
      try {
        const res   = await fetch('/api/conversations');
        const convs = await res.json();

        if (convs.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              هنوز گفتگویی ندارید.<br/>
              <a href="/chat">اولین چت خود را شروع کنید ←</a>
            </div>`;
          return;
        }

        list.innerHTML = '';
        convs.forEach((conv, i) => {
          const div = document.createElement('a');
          div.className = 'conv-card';
          div.href      = `/chat?conv=${conv.id}`;
          div.style.animationDelay = (i * 0.05) + 's';
          div.innerHTML = `
            <div class="conv-icon">💬</div>
            <div class="conv-body">
              <div class="conv-title">${conv.title}</div>
              <div class="conv-date">${formatDate(conv.updated_at)}</div>
            </div>
            <button class="conv-del" onclick="deleteConv(event, ${conv.id})">✕</button>`;
          list.appendChild(div);
        });
      } catch (err) {
        list.innerHTML = '<div class="empty-state">خطا در بارگذاری گفتگوها</div>';
      }
    }

    async function deleteConv(e, id) {
      e.preventDefault();
      e.stopPropagation();
      await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
      loadConversations();
    }

    loadUser();
    loadConversations();
  </script>
</body>
</html>
