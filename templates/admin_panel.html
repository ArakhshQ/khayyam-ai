<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>پنل ادمین — خیام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { min-height: 100vh; }

    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }

    .nav-links { display: flex; gap: 6px; }
    .nav-btn {
      padding: 5px 12px; border-radius: 7px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-dim); font-family: 'Vazirmatn', sans-serif;
      font-size: 13px; cursor: pointer; text-decoration: none; transition: all 0.2s;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }

    .page { max-width: 960px; margin: 0 auto; padding: 28px 20px 100px; }

    /* ── STATS ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-num { font-size: 26px; font-weight: 700; color: var(--gold); }
    .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 6px; margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 16px; border-radius: 8px 8px 0 0;
      border: 1px solid transparent; border-bottom: none;
      background: transparent; color: var(--text-dim);
      font-family: 'Vazirmatn', sans-serif; font-size: 13px;
      cursor: pointer; transition: all 0.2s; margin-bottom: -1px;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--surface); border-color: var(--border);
      color: var(--gold); border-bottom-color: var(--surface);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section-title {
      font-size: 14px; font-weight: 700;
      color: var(--text); margin-bottom: 16px;
    }

    /* ── FORMS ── */
    .add-form {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; margin-bottom: 20px;
    }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .form-row:last-child { margin-bottom: 0; }

    input[type=text], textarea, select {
      flex: 1; min-width: 140px;
      padding: 9px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Vazirmatn', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    input[type=text]:focus, textarea:focus, select:focus { border-color: var(--gold-dim); }
    textarea { resize: vertical; min-height: 72px; width: 100%; }
    select option { background: var(--surface2); }

    .add-btn {
      padding: 9px 20px; background: var(--gold); color: #0f0e0c;
      border: none; border-radius: 8px;
      font-family: 'Vazirmatn', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .add-btn:hover { background: #e0bb60; }

    /* ── ITEMS ── */
    .items-list { display: flex; flex-direction: column; gap: 8px; }

    .item-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: flex-start; gap: 12px;
    }

    .item-body { flex: 1; font-size: 14px; line-height: 1.7; }
    .item-label {
      font-size: 11px; font-weight: 500; color: var(--text-dim);
      letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px;
    }
    .item-correct { color: var(--green-lt); font-weight: 500; }
    .item-wrong   { color: var(--red-lt); text-decoration: line-through; }
    .item-note    { color: var(--text-dim); font-size: 12px; }
    .item-topic   { color: var(--gold); font-weight: 500; margin-bottom: 4px; }
    .item-content { color: var(--text); font-size: 13px; }

    .del-btn {
      width: 28px; height: 28px; flex-shrink: 0;
      border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--text-dim);
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .del-btn:hover { background: var(--red); color: var(--red-lt); border-color: var(--red); }

    .empty-state {
      text-align: center; padding: 32px;
      color: var(--text-dim); font-size: 14px;
    }

    /* ── USER TABLE ── */
    .user-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .user-table th {
      text-align: right;
      padding: 10px 14px;
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .user-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    .user-table tr:last-child td { border-bottom: none; }
    .user-table tr:hover td { background: var(--surface2); }

    .plan-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 6px;
    }

    .plan-free    { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
    .plan-basic   { background: rgba(58,130,200,0.15); color: #6ab0e0; }
    .plan-pro     { background: rgba(201,168,76,0.15); color: var(--gold); }
    .plan-premium { background: rgba(160,100,200,0.15); color: #c080e0; }

    .admin-badge {
      display: inline-block; font-size: 10px;
      padding: 2px 6px; border-radius: 4px;
      background: rgba(201,168,76,0.15); color: var(--gold);
    }

    /* usage mini bar */
    .usage-bar-wrap {
      width: 100px;
    }

    .usage-bar-track {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 3px;
    }

    .usage-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--gold);
    }

    .usage-bar-label {
      font-size: 10px;
      color: var(--text-dim);
    }

    /* plan select dropdown */
    .plan-select {
      padding: 4px 8px;
      font-size: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Vazirmatn', sans-serif;
    }

    /* toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface); border: 1px solid var(--gold-dim);
      color: var(--gold); padding: 10px 24px; border-radius: 99px;
      font-size: 14px; font-weight: 500;
      transition: transform 0.3s ease; z-index: 200;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* overview stats section */
    .overview-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .overview-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .overview-row:last-child { border-bottom: none; }
    .overview-key { color: var(--text-dim); }
    .overview-val { color: var(--text); font-weight: 500; }
    .overview-val.gold { color: var(--gold); }

    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      header { padding: 0 14px; }
      .page { padding: 20px 14px 100px; }
      .user-table th:nth-child(3),
      .user-table td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="logo">
    <div class="logo-mark">خ</div>
    <span class="logo-text">خیام — ادمین</span>
  </a>
  <div class="nav-links">
    <a href="/chat" class="nav-btn">← بازگشت به چت</a>
  </div>
</header>

<div class="page">

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="stat-total-users">—</div>
      <div class="stat-label">کل کاربران</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-paid-users">—</div>
      <div class="stat-label">کاربران پولی</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-dialect">—</div>
      <div class="stat-label">کلمات دری</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-examples">—</div>
      <div class="stat-label">نمونه گفتگو</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('users', this)">👥 کاربران</button>
    <button class="tab" onclick="switchTab('dialect', this)">🗣️ کلمات دری</button>
    <button class="tab" onclick="switchTab('culture', this)">🏛️ فرهنگ</button>
    <button class="tab" onclick="switchTab('examples', this)">💬 نمونه گفتگو</button>
  </div>

  <!-- TAB: USERS -->
  <div class="tab-content active" id="tab-users">

    <div class="overview-section" id="plan-overview">
      <div class="section-title">توزیع پلان‌ها</div>
      <div class="overview-row">
        <span class="overview-key">رایگان</span>
        <span class="overview-val" id="count-free">—</span>
      </div>
      <div class="overview-row">
        <span class="overview-key">پایه ($10)</span>
        <span class="overview-val" id="count-basic">—</span>
      </div>
      <div class="overview-row">
        <span class="overview-key">حرفه‌ای ($20)</span>
        <span class="overview-val gold" id="count-pro">—</span>
      </div>
      <div class="overview-row">
        <span class="overview-key">پریمیوم ($40)</span>
        <span class="overview-val gold" id="count-premium">—</span>
      </div>
      <div class="overview-row">
        <span class="overview-key">درآمد تخمینی ماهانه</span>
        <span class="overview-val gold" id="est-revenue">—</span>
      </div>
    </div>

    <div style="overflow-x:auto;">
      <table class="user-table">
        <thead>
          <tr>
            <th>کاربر</th>
            <th>پلان</th>
            <th>ایمیل / تلفن</th>
            <th>تاریخ عضویت</th>
            <th>تغییر پلان</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-dim);">در حال بارگذاری...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- TAB: DIALECT -->
  <div class="tab-content" id="tab-dialect">
    <div class="add-form">
      <div class="section-title">+ کلمه دری جدید</div>
      <div class="form-row">
        <input type="text" id="d-correct" placeholder='کلمه درست — مثال: "موتر"'/>
        <input type="text" id="d-wrong"   placeholder='کلمه اشتباه — مثال: "ماشین"'/>
        <input type="text" id="d-note"    placeholder='توضیح'/>
        <button class="add-btn" onclick="addDialect()">اضافه</button>
      </div>
    </div>
    <div class="items-list" id="dialect-list"></div>
  </div>

  <!-- TAB: CULTURE -->
  <div class="tab-content" id="tab-culture">
    <div class="add-form">
      <div class="section-title">+ فرهنگ یا سنت جدید</div>
      <div class="form-row">
        <input type="text" id="c-topic" placeholder='موضوع — مثال: "مهمان‌نوازی"'/>
      </div>
      <div class="form-row">
        <textarea id="c-content" placeholder="توضیح کامل به دری افغانی..."></textarea>
      </div>
      <div class="form-row">
        <button class="add-btn" onclick="addCulture()">اضافه</button>
      </div>
    </div>
    <div class="items-list" id="culture-list"></div>
  </div>

  <!-- TAB: EXAMPLES -->
  <div class="tab-content" id="tab-examples">
    <div class="add-form">
      <div class="section-title">+ نمونه گفتگو جدید</div>
      <div class="form-row">
        <textarea id="e-user" placeholder="پیام کاربر..."></textarea>
      </div>
      <div class="form-row">
        <textarea id="e-assistant" placeholder="جواب ایده‌آل خیام به دری افغانی..."></textarea>
      </div>
      <div class="form-row">
        <button class="add-btn" onclick="addExample()">اضافه</button>
      </div>
    </div>
    <div class="items-list" id="examples-list"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  let knowledge = {};
  let examples  = {};
  let users     = [];

  const PLAN_PRICES = { free: 0, basic: 10, pro: 20, premium: 40 };
  const PLAN_LABELS = { free: 'رایگان', basic: 'پایه', pro: 'حرفه‌ای', premium: 'پریمیوم' };

  // ── INIT ──
  async function init() {
    const [k, e, u] = await Promise.all([
      fetch('/api/admin/knowledge').then(r => r.json()),
      fetch('/api/admin/examples').then(r => r.json()),
      fetch('/api/admin/users').then(r => r.json())
    ]);
    knowledge = k;
    examples  = e;
    users     = u;
    renderAll();
    renderUsers();
    updateStats();
  }

  function renderAll() {
    renderDialect();
    renderCulture();
    renderExamples();
  }

  function updateStats() {
    const paid    = users.filter(u => u.plan !== 'free').length;
    const counts  = { free: 0, basic: 0, pro: 0, premium: 0 };
    let revenue   = 0;

    users.forEach(u => {
      counts[u.plan] = (counts[u.plan] || 0) + 1;
      revenue += PLAN_PRICES[u.plan] || 0;
    });

    document.getElementById('stat-total-users').textContent = users.length;
    document.getElementById('stat-paid-users').textContent  = paid;
    document.getElementById('stat-dialect').textContent     = (knowledge.dari_dialect || []).length;
    document.getElementById('stat-examples').textContent    = (examples.conversation_examples || []).length;

    document.getElementById('count-free').textContent    = counts.free + ' نفر';
    document.getElementById('count-basic').textContent   = counts.basic + ' نفر';
    document.getElementById('count-pro').textContent     = counts.pro + ' نفر';
    document.getElementById('count-premium').textContent = counts.premium + ' نفر';
    document.getElementById('est-revenue').textContent   = '$' + revenue + ' / ماه';
  }

  // ── TABS ──
  function switchTab(name, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── USERS ──
  function renderUsers() {
    const tbody = document.getElementById('users-tbody');
    if (!users || users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-dim);">هنوز کاربری ثبت‌نام نکرده</td></tr>';
      return;
    }

    tbody.innerHTML = '';
    users.forEach(u => {
      const tr = document.createElement('tr');
      const joinDate = new Date(u.created_at).toLocaleDateString('fa-AF');
      const planClass = `plan-${u.plan}`;
      const planLabel = PLAN_LABELS[u.plan] || u.plan;

      tr.innerHTML = `
        <td>
          <div style="font-weight:500;">${u.username}</div>
          ${u.is_admin ? '<span class="admin-badge">👑 ادمین</span>' : ''}
        </td>
        <td><span class="plan-badge ${planClass}">${planLabel}</span></td>
        <td style="color:var(--text-dim);font-size:12px;">
          ${u.email || ''} ${u.phone ? '· ' + u.phone : ''}
        </td>
        <td style="color:var(--text-dim);font-size:12px;">${joinDate}</td>
        <td>
          <select class="plan-select" onchange="changePlan(${u.id}, this.value)">
            <option value="free"    ${u.plan === 'free'    ? 'selected' : ''}>رایگان</option>
            <option value="basic"   ${u.plan === 'basic'   ? 'selected' : ''}>پایه $10</option>
            <option value="pro"     ${u.plan === 'pro'     ? 'selected' : ''}>حرفه‌ای $20</option>
            <option value="premium" ${u.plan === 'premium' ? 'selected' : ''}>پریمیوم $40</option>
          </select>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  async function changePlan(userId, newPlan) {
    const res  = await fetch(`/api/admin/users/${userId}/plan`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ plan: newPlan })
    });
    const data = await res.json();
    if (data.success) {
      const u = users.find(u => u.id === userId);
      if (u) u.plan = newPlan;
      updateStats();
      showToast('✓ پلان تغییر یافت');
    }
  }

  // ── DIALECT ──
  function renderDialect() {
    const list  = document.getElementById('dialect-list');
    const items = knowledge.dari_dialect || [];
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state">هنوز کلمه‌ای اضافه نشده</div>';
      return;
    }
    list.innerHTML = '';
    items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'item-card';
      div.innerHTML = `
        <div class="item-body">
          <div class="item-label">درست ← اشتباه</div>
          <span class="item-correct">${item.correct}</span>
          <span style="color:var(--text-dim)"> ← </span>
          <span class="item-wrong">${item.wrong}</span>
          <div class="item-note">${item.note}</div>
        </div>
        <button class="del-btn" onclick="deleteDialect(${i})">✕</button>`;
      list.appendChild(div);
    });
  }

  async function addDialect() {
    const correct = document.getElementById('d-correct').value.trim();
    const wrong   = document.getElementById('d-wrong').value.trim();
    const note    = document.getElementById('d-note').value.trim();
    if (!correct || !wrong) return;
    await fetch('/api/admin/dialect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ correct, wrong, note })
    });
    knowledge.dari_dialect.push({ correct, wrong, note });
    document.getElementById('d-correct').value = '';
    document.getElementById('d-wrong').value   = '';
    document.getElementById('d-note').value    = '';
    renderDialect();
    updateStats();
    showToast('✓ کلمه اضافه شد');
  }

  async function deleteDialect(i) {
    await fetch(`/api/admin/dialect/${i}`, { method: 'DELETE' });
    knowledge.dari_dialect.splice(i, 1);
    renderDialect();
    updateStats();
    showToast('حذف شد');
  }

  // ── CULTURE ──
  function renderCulture() {
    const list  = document.getElementById('culture-list');
    const items = knowledge.cultural_customs || [];
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state">هنوز فرهنگی اضافه نشده</div>';
      return;
    }
    list.innerHTML = '';
    items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'item-card';
      div.innerHTML = `
        <div class="item-body">
          <div class="item-topic">${item.topic}</div>
          <div class="item-content">${item.content}</div>
        </div>
        <button class="del-btn" onclick="deleteCulture(${i})">✕</button>`;
      list.appendChild(div);
    });
  }

  async function addCulture() {
    const topic   = document.getElementById('c-topic').value.trim();
    const content = document.getElementById('c-content').value.trim();
    if (!topic || !content) return;
    await fetch('/api/admin/culture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, content })
    });
    knowledge.cultural_customs.push({ topic, content });
    document.getElementById('c-topic').value   = '';
    document.getElementById('c-content').value = '';
    renderCulture();
    showToast('✓ فرهنگ اضافه شد');
  }

  async function deleteCulture(i) {
    await fetch(`/api/admin/culture/${i}`, { method: 'DELETE' });
    knowledge.cultural_customs.splice(i, 1);
    renderCulture();
    showToast('حذف شد');
  }

  // ── EXAMPLES ──
  function renderExamples() {
    const list  = document.getElementById('examples-list');
    const items = examples.conversation_examples || [];
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state">هنوز نمونه‌ای اضافه نشده</div>';
      return;
    }
    list.innerHTML = '';
    items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'item-card';
      div.innerHTML = `
        <div class="item-body">
          <div class="item-label">کاربر</div>
          <div class="item-content" style="margin-bottom:8px">${item.user}</div>
          <div class="item-label">خیام</div>
          <div class="item-correct">${item.assistant}</div>
        </div>
        <button class="del-btn" onclick="deleteExample(${i})">✕</button>`;
      list.appendChild(div);
    });
  }

  async function addExample() {
    const user      = document.getElementById('e-user').value.trim();
    const assistant = document.getElementById('e-assistant').value.trim();
    if (!user || !assistant) return;
    await fetch('/api/admin/example', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, assistant })
    });
    examples.conversation_examples.push({ user, assistant });
    document.getElementById('e-user').value      = '';
    document.getElementById('e-assistant').value = '';
    renderExamples();
    updateStats();
    showToast('✓ نمونه اضافه شد');
  }

  async function deleteExample(i) {
    await fetch(`/api/admin/example/${i}`, { method: 'DELETE' });
    examples.conversation_examples.splice(i, 1);
    renderExamples();
    updateStats();
    showToast('حذف شد');
  }

  init();
</script>
</body>
</html>
