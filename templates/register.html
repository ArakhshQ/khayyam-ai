<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ثبت‌نام — خیام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a href="/" class="logo">
      <div class="logo-mark">خ</div>
      <span class="logo-text">خیام</span>
    </a>
    <a href="/login" class="nav-link">ورود</a>
  </nav>

  <div class="page">
    <div class="card">
      <div class="card-top">
        <span class="card-icon">✨</span>
        <h1>ثبت‌نام در خیام</h1>
        <p>حساب رایگان بسازید و گفتگوهای خود را ذخیره کنید</p>
      </div>

      <div id="error-box" class="error-box"></div>
      <div id="success-box" class="success-box"></div>

      <div class="form-group">
        <label class="form-label">نام کاربری</label>
        <input class="form-input" type="text" id="username" placeholder="مثال: ahmad123"/>
      </div>

      <!-- method toggle -->
      <div class="form-group">
        <label class="form-label">روش ثبت‌نام</label>
        <div class="method-toggle">
          <button class="method-btn active" onclick="setMethod('email', this)">📧 ایمیل</button>
          <button class="method-btn" onclick="setMethod('phone', this)">📱 شماره تلفن</button>
        </div>

        <div id="email-field">
          <input class="form-input" type="email" id="email" placeholder="example@gmail.com" style="direction:ltr"/>
        </div>
        <div id="phone-field" style="display:none">
          <input class="form-input" type="tel" id="phone" placeholder="+93 700 000 000" style="direction:ltr"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">رمز عبور</label>
        <input class="form-input" type="password" id="password" placeholder="حداقل ۶ حرف"/>
        <div class="password-hint">رمز عبور باید حداقل ۶ حرف داشته باشد</div>
      </div>

      <div class="form-group">
        <label class="form-label">تکرار رمز عبور</label>
        <input class="form-input" type="password" id="password2" placeholder="رمز عبور را دوباره وارد کنید"/>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="register()">
        ساختن حساب ←
      </button>

      <div class="footer-link">
        قبلاً حساب دارید؟ <a href="/login">وارد شوید</a>
      </div>
    </div>
  </div>
<!-- BOTTOM NAV — mobile only -->
<nav class="kh-bottom-nav">
  <div class="kh-bottom-nav-inner">
    <a href="/" class="kh-bottom-tab">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">خانه</span>
    </a>
    <a href="/chat" class="kh-bottom-tab">
      <span class="tab-icon">💬</span>
      <span class="tab-label">چت</span>
    </a>
    <a href="/tutor" class="kh-bottom-tab">
      <span class="tab-icon">📚</span>
      <span class="tab-label">بیاموز</span>
    </a>
    <a href="/profile" class="kh-bottom-tab">
      <span class="tab-icon">👤</span>
      <span class="tab-label">پروفایل</span>
    </a>
  </div>
</nav>
  <script>
    let currentMethod = 'email';

    function setMethod(method, btn) {
      currentMethod = method;
      document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('email-field').style.display = method === 'email' ? 'block' : 'none';
      document.getElementById('phone-field').style.display = method === 'phone' ? 'block' : 'none';
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
      document.getElementById('success-box').style.display = 'none';
    }

    function showSuccess(msg) {
      const box = document.getElementById('success-box');
      box.textContent = msg;
      box.style.display = 'block';
      document.getElementById('error-box').style.display = 'none';
    }

    // allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') register();
    });

    async function register() {
      const username  = document.getElementById('username').value.trim();
      const password  = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const email     = currentMethod === 'email'  ? document.getElementById('email').value.trim()  : null;
      const phone     = currentMethod === 'phone'  ? document.getElementById('phone').value.trim()  : null;

      if (!username)           return showError('نام کاربری الزامی است');
      if (username.length < 3) return showError('نام کاربری باید حداقل ۳ حرف باشد');
      if (!email && !phone)    return showError('ایمیل یا شماره تلفن الزامی است');
      if (password.length < 6) return showError('رمز عبور باید حداقل ۶ حرف باشد');
      if (password !== password2) return showError('رمزهای عبور یکسان نیستند');

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'در حال ثبت‌نام...';

      try {
        const res  = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, email, phone })
        });
        const data = await res.json();

        if (data.success) {
          showSuccess('حساب شما ساخته شد! در حال انتقال...');
          setTimeout(() => window.location.href = '/chat', 1200);
        } else {
          showError(data.error);
          btn.disabled = false;
          btn.textContent = 'ساختن حساب ←';
        }
      } catch (err) {
        showError('خطای اتصال. دوباره امتحان کنید.');
        btn.disabled = false;
        btn.textContent = 'ساختن حساب ←';
      }
    }
  </script>
</body>
</html>
