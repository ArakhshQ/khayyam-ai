<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ثبت‌نام — خیام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0c; --surface: #1a1814; --surface2: #232018;
      --border: #2e2a22; --gold: #c9a84c; --gold-dim: #8a6e2f;
      --text: #ede8df; --text-dim: #7a7060;
      --green: #2a4a20; --green-lt: #7abf6a;
      --red: #4a2020; --red-lt: #bf6a6a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Vazirmatn', sans-serif;
      min-height: 100vh; display: flex;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(201,168,76,0.015) 40px, rgba(201,168,76,0.015) 41px),
        repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(201,168,76,0.015) 40px, rgba(201,168,76,0.015) 41px);
      pointer-events: none; z-index: 0;
    }
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-mark {
      width: 30px; height: 30px; border: 1.5px solid var(--gold);
      border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 14px; font-weight: 700; color: var(--gold);
    }
    .logo-text { font-size: 16px; font-weight: 700; color: var(--gold); }
    .nav-link {
      color: var(--text-dim); text-decoration: none;
      font-size: 13px; padding: 5px 12px; border-radius: 7px;
      border: 1px solid var(--border); transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }

    .page {
      position: relative; z-index: 1;
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      padding: 40px 16px;
    }

    .card {
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top { text-align: center; margin-bottom: 28px; }
    .card-icon { font-size: 36px; display: block; margin-bottom: 12px; }
    .card-top h1 { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
    .card-top p  { font-size: 13px; color: var(--text-dim); line-height: 1.7; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--text-dim); margin-bottom: 7px;
      letter-spacing: 0.05em;
    }
    .form-input {
      width: 100%; padding: 11px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px; color: var(--text);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 14px; outline: none;
      transition: border-color 0.2s;
      direction: rtl;
    }
    .form-input:focus { border-color: var(--gold-dim); }
    .form-input::placeholder { color: var(--text-dim); }

    /* toggle between email and phone */
    .method-toggle {
      display: flex; gap: 6px; margin-bottom: 16px;
    }
    .method-btn {
      flex: 1; padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'Vazirmatn', sans-serif;
      font-size: 13px; cursor: pointer;
      transition: all 0.2s;
    }
    .method-btn.active {
      border-color: var(--gold);
      background: rgba(201,168,76,0.1);
      color: var(--gold);
      font-weight: 500;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 6px 0 16px; color: var(--text-dim); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .submit-btn {
      width: 100%; padding: 13px;
      background: var(--gold); color: #0f0e0c;
      border: none; border-radius: 9px;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      margin-top: 4px;
    }
    .submit-btn:hover { background: #e0bb60; transform: translateY(-1px); }
    .submit-btn:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; transform: none; }

    .error-box {
      background: var(--red); border: 1px solid #6a2a2a;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: var(--red-lt);
      margin-bottom: 16px; display: none;
    }

    .success-box {
      background: var(--green); border: 1px solid #3a6a2a;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: var(--green-lt);
      margin-bottom: 16px; display: none;
    }

    .footer-link {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--text-dim);
    }
    .footer-link a { color: var(--gold); text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    .password-hint {
      font-size: 11px; color: var(--text-dim);
      margin-top: 5px; padding-right: 4px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="logo">
      <div class="logo-mark">خ</div>
      <span class="logo-text">خیام</span>
    </a>
    <a href="/login" class="nav-link">ورود</a>
  </nav>

  <div class="page">
    <div class="card">
      <div class="card-top">
        <span class="card-icon">✨</span>
        <h1>ثبت‌نام در خیام</h1>
        <p>حساب رایگان بسازید و گفتگوهای خود را ذخیره کنید</p>
      </div>

      <div id="error-box" class="error-box"></div>
      <div id="success-box" class="success-box"></div>

      <div class="form-group">
        <label class="form-label">نام کاربری</label>
        <input class="form-input" type="text" id="username" placeholder="مثال: ahmad123"/>
      </div>

      <!-- method toggle -->
      <div class="form-group">
        <label class="form-label">روش ثبت‌نام</label>
        <div class="method-toggle">
          <button class="method-btn active" onclick="setMethod('email', this)">📧 ایمیل</button>
          <button class="method-btn" onclick="setMethod('phone', this)">📱 شماره تلفن</button>
        </div>

        <div id="email-field">
          <input class="form-input" type="email" id="email" placeholder="example@gmail.com" style="direction:ltr"/>
        </div>
        <div id="phone-field" style="display:none">
          <input class="form-input" type="tel" id="phone" placeholder="+93 700 000 000" style="direction:ltr"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">رمز عبور</label>
        <input class="form-input" type="password" id="password" placeholder="حداقل ۶ حرف"/>
        <div class="password-hint">رمز عبور باید حداقل ۶ حرف داشته باشد</div>
      </div>

      <div class="form-group">
        <label class="form-label">تکرار رمز عبور</label>
        <input class="form-input" type="password" id="password2" placeholder="رمز عبور را دوباره وارد کنید"/>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="register()">
        ساختن حساب ←
      </button>

      <div class="footer-link">
        قبلاً حساب دارید؟ <a href="/login">وارد شوید</a>
      </div>
    </div>
  </div>

  <script>
    let currentMethod = 'email';

    function setMethod(method, btn) {
      currentMethod = method;
      document.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('email-field').style.display = method === 'email' ? 'block' : 'none';
      document.getElementById('phone-field').style.display = method === 'phone' ? 'block' : 'none';
    }

    function showError(msg) {
      const box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
      document.getElementById('success-box').style.display = 'none';
    }

    function showSuccess(msg) {
      const box = document.getElementById('success-box');
      box.textContent = msg;
      box.style.display = 'block';
      document.getElementById('error-box').style.display = 'none';
    }

    // allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') register();
    });

    async function register() {
      const username  = document.getElementById('username').value.trim();
      const password  = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const email     = currentMethod === 'email'  ? document.getElementById('email').value.trim()  : null;
      const phone     = currentMethod === 'phone'  ? document.getElementById('phone').value.trim()  : null;

      if (!username)           return showError('نام کاربری الزامی است');
      if (username.length < 3) return showError('نام کاربری باید حداقل ۳ حرف باشد');
      if (!email && !phone)    return showError('ایمیل یا شماره تلفن الزامی است');
      if (password.length < 6) return showError('رمز عبور باید حداقل ۶ حرف باشد');
      if (password !== password2) return showError('رمزهای عبور یکسان نیستند');

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'در حال ثبت‌نام...';

      try {
        const res  = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, email, phone })
        });
        const data = await res.json();

        if (data.success) {
          showSuccess('حساب شما ساخته شد! در حال انتقال...');
          setTimeout(() => window.location.href = '/chat', 1200);
        } else {
          showError(data.error);
          btn.disabled = false;
          btn.textContent = 'ساختن حساب ←';
        }
      } catch (err) {
        showError('خطای اتصال. دوباره امتحان کنید.');
        btn.disabled = false;
        btn.textContent = 'ساختن حساب ←';
      }
    }
  </script>
</body>
</html>
